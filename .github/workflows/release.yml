# Tag a commit manually, then push (or merge) it onto the 'release' branch to publish it.
# The workflow only proceeds past check_tag when both conditions hold:
#   - the push landed on the 'release' branch
#   - the pushed commit (HEAD) already has a tag pointing at it
name: Release

on:
    push:
        branches:
            - master

jobs:
    check_tag:
        runs-on: ubuntu-latest
        outputs:
            tagged: ${{ steps.check.outputs.tagged }}
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - id: check
              run: |
                  if [ -n "$(git tag --points-at HEAD)" ]; then
                    echo "tagged=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "tagged=false" >> "$GITHUB_OUTPUT"
                  fi

    build_windows:
        needs: check_tag
        if: needs.check_tag.outputs.tagged == 'true'
        runs-on: windows-latest
        defaults:
            run:
                shell: bash
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - id: setup-node
              uses: actions/setup-node@v6
              with:
                  node-version: "24"
                  cache: "npm"

            - id: node-major-version
              run: echo "version=${NODE_VERSION%%.*}" >> "$GITHUB_OUTPUT"
              env:
                  NODE_VERSION: ${{ steps.setup-node.outputs.node-version }}

            # package-lock.json's root "version" (and packages[""].version) mirror
            # package.json's version, which standard-version bumps on every release
            # commit. Hashing the raw file would invalidate the cache on every run
            # even when dependencies didn't change, so hash a copy with those
            # version fields stripped instead.
            - run: jq 'del(.version) | del(.packages[""].version)' package-lock.json > .cache-lockfile.json

            - id: cache-node-modules
              uses: actions/cache@v5
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node${{ steps.node-major-version.outputs.version }}-node-modules-${{ hashFiles('.cache-lockfile.json') }}

            - if: steps.cache-node-modules.outputs.cache-hit != 'true'
              run: npm install

            - run: npm run build

            - run: mkdir -p workspace/artifacts workspace/metadata
            - run: cp release/*.exe workspace/artifacts/
            - run: git describe --abbrev=0 --tags > workspace/metadata/version.txt
            - run: awk -v start=1 '/\/compare\//{n++;next};n==start;n==start+1{exit}' CHANGELOG.md > workspace/metadata/changelog.txt

            - uses: actions/upload-artifact@v7
              with:
                  name: release-workspace
                  path: workspace

    build_mac:
        needs: check_tag
        if: needs.check_tag.outputs.tagged == 'true'
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - id: setup-node
              uses: actions/setup-node@v6
              with:
                  node-version: "24"
                  cache: "npm"

            - id: node-major-version
              run: echo "version=${NODE_VERSION%%.*}" >> "$GITHUB_OUTPUT"
              env:
                  NODE_VERSION: ${{ steps.setup-node.outputs.node-version }}

            # See build_windows: strip the version fields that standard-version
            # bumps on every release commit so the cache key stays stable across
            # releases when dependencies haven't actually changed.
            - run: jq 'del(.version) | del(.packages[""].version)' package-lock.json > .cache-lockfile.json

            - id: cache-node-modules
              uses: actions/cache@v5
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node${{ steps.node-major-version.outputs.version }}-node-modules-${{ hashFiles('.cache-lockfile.json') }}

            - if: steps.cache-node-modules.outputs.cache-hit != 'true'
              run: npm install

            - run: npm run compile

            # electron-builder.json5's mac config targets "dir" with a codesign
            # identity ("WorkLogIfy Certificate") that normally only exists in the
            # maintainer's local keychain. This is a self-signed cert, so unlike
            # an Apple Developer ID it doesn't chain to a trusted root -- importing
            # it alone leaves it CSSMERR_TP_NOT_TRUSTED and electron-builder's own
            # "security find-identity -v -p codesigning" check skips it. We build a
            # dedicated CI keychain, import the cert, and explicitly mark it as a
            # trusted root, mirroring the "Always Trust" setting on the
            # maintainer's local keychain that CSC_LINK auto-import can't replicate.
            - name: Import and trust signing certificate
              env:
                  MAC_CERTS: ${{ secrets.MAC_CERTS }}
                  MAC_CERTS_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
              run: |
                  KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
                  KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
                  CERT_PATH="$RUNNER_TEMP/certificate.p12"
                  CERT_PEM_PATH="$RUNNER_TEMP/certificate.pem"

                  echo -n "$MAC_CERTS" | base64 --decode -o "$CERT_PATH"

                  security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
                  security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
                  security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
                  security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

                  security import "$CERT_PATH" -P "$MAC_CERTS_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

                  # Pull the cert back out via `security` (Apple's Security
                  # framework) rather than `openssl pkcs12`: security export's
                  # .p12 encrypts certs with the legacy RC2-40-CBC cipher, and the
                  # runner's OpenSSL 3 build has no legacy provider to read it.
                  security find-certificate -c "WorkLogIfy Certificate" -p "$KEYCHAIN_PATH" > "$CERT_PEM_PATH"
                  sudo security add-trusted-cert -d -r trustRoot -k "$KEYCHAIN_PATH" "$CERT_PEM_PATH"

                  security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

                  rm -f "$CERT_PATH" "$CERT_PEM_PATH"
                  echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

            - run: npx electron-builder --mac dmg --arm64 --publish never

            - if: always()
              run: security delete-keychain "$KEYCHAIN_PATH" || true

            - run: mkdir -p workspace/artifacts
            - run: cp release/*.dmg workspace/artifacts/

            - uses: actions/upload-artifact@v7
              with:
                  name: release-workspace-mac
                  path: workspace/artifacts

    publish_github_release:
        needs:
            - build_windows
            - build_mac
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/download-artifact@v8
              with:
                  name: release-workspace
                  path: workspace

            - uses: actions/download-artifact@v8
              with:
                  name: release-workspace-mac
                  path: workspace/artifacts

            - id: version
              run: echo "tag=$(cat workspace/metadata/version.txt)" >> "$GITHUB_OUTPUT"

            - name: Publish Release on GitHub
              uses: softprops/action-gh-release@v3
              with:
                  tag_name: ${{ steps.version.outputs.tag }}
                  body_path: workspace/metadata/changelog.txt
                  files: workspace/artifacts/*
